name: Bug report
description: Report a runtime bug, broken setup, or failing command.
labels: [bug, feedback, needs-triage]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: dropdown
    id: source
    attributes:
      label: Reporter type
      options:
        - Human
        - AI agent
    validations:
      required: true
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Short description of the bug
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What did you try?
      placeholder: Describe the page, command, or flow you used.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: reference
    attributes:
      label: Relevant page, doc, or command
      placeholder: /path, page URL, or command
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node.js, pnpm, browser, database/Redis, commit or release
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: shell
      placeholder: Paste the smallest useful excerpt
    validations:
      required: false
