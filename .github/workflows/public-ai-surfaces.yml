name: Public AI Surfaces

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-ai-surfaces:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter docs build

      - name: Test feedback draft
        run: pnpm --filter @common-admin/feedback-draft test

      - name: Test MCP server
        run: pnpm --filter @common-admin/mcp-server test

      - name: Typecheck MCP server
        run: pnpm --filter @common-admin/mcp-server typecheck
