name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated API contract
        run: pnpm api:check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: API e2e
        run: pnpm --filter api test:e2e

      - name: Build
        run: pnpm build
