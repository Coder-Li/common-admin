services:
  admin:
    ports: !override
      - "127.0.0.1:${ADMIN_HTTP_PORT:-8080}:80"

  api:
    environment:
      ENABLE_DIAGNOSTIC_ERROR_ENDPOINT: "true"

  loki:
    image: grafana/loki:3.4.2
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./deploy/observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  grafana:
    image: grafana/grafana:11.5.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_HTTP_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki

  alloy:
    image: grafana/alloy:v1.6.1
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy", "--storage.path=/var/lib/alloy/data"]
    environment:
      COMMON_ADMIN_COMPOSE_PROJECT: ${COMPOSE_PROJECT_NAME:-common-admin}
    volumes:
      - ./deploy/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - loki

volumes:
  loki-data:
  grafana-data:
  alloy-data:
